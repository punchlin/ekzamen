name: "Deploy Application Task 3"

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t yulianna2022/my-app:develop https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker build -t yulianna2022/my-app:1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker push yulianna2022/my-app:develop
          docker push yulianna2022/my-app:1.0.0

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.223.31.123 # ПЕРЕВІР IP ТУТ!
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Створюємо Namespace (якщо нема)
            kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -
            kubectl create namespace release --dry-run=client -o yaml | kubectl apply -f -

            # 2. Деплоїмо DEV прямо через текст (щоб не залежати від файлів)
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-dev
              namespace: dev
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: my-app
              template:
                metadata:
                  labels:
                    app: my-app
                spec:
                  containers:
                  - name: web-app
                    image: yulianna2022/my-app:develop
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: app-service-dev
              namespace: dev
            spec:
              type: NodePort
              selector:
                app: my-app
              ports:
                - port: 80
                  targetPort: 80
                  nodePort: 30002
            EOF

            # 3. Деплоїмо RELEASE
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-release
              namespace: release
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: my-app
              template:
                metadata:
                  labels:
                    app: my-app
                spec:
                  containers:
                  - name: web-app
                    image: yulianna2022/my-app:1.0.0
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: app-service-release
              namespace: release
            spec:
              type: NodePort
              selector:
                app: my-app
              ports:
                - port: 80
                  targetPort: 80
                  nodePort: 30003
            EOF

            # 4. Вбиваємо старі порти та запускаємо нові так, щоб вони НЕ вмирали
            pkill -f "port-forward" || true
            sleep 5
            
            echo "Starting port-forwarding for DEV on 8002..."
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev > /dev/null 2>&1 &
            
            echo "Starting port-forwarding for RELEASE on 8003..."
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release > /dev/null 2>&1 &
            
            sleep 5
            echo "Final check of pods:"