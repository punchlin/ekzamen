name: "Deploy Application Task 3"

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t yulianna2022/my-app:develop https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker build -t yulianna2022/my-app:1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker push yulianna2022/my-app:develop
          docker push yulianna2022/my-app:1.0.0

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.223.31.123 # ПЕРЕВІР IP ТУТ!
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Застосовуємо маніфести (DEV та RELEASE)
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-dev.yaml
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-release.yaml

            # 2. Вбиваємо старі процеси
            pkill -f "port-forward" || true
            sleep 10

            # 3. ЗАПУСК ПОРТ-ФОРВАРДУ (Через системну службу, щоб не вмирало)
            # Це змусить сервер тримати порти відкритими навіть після нашого виходу
            echo "Starting port-forwarding for DEV on 8002..."
            systemd-run --unit=pf-dev --scope --bg kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev
            
            echo "Starting port-forwarding for RELEASE on 8003..."
            systemd-run --unit=pf-rel --scope --bg kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release
            
            sleep 10
            echo "Checking if ports are listening..."
            apt-get install -y net-tools
            netstat -tuln | grep -E '8002|8003' || echo "PORT FORWARD FAILED"
            
            echo "Final Pod Status:"
            kubectl get pods -A | grep -E 'dev|release'