name: "Deploy Application Task 3"

on:
  workflow_dispatch: # Запуск вручну

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Your Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Тут ми імітуємо роботу з двома версіями застосунку
      - name: Build and Push Docker Images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:develop https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:develop
          docker push ${{ secrets.DOCKER_USERNAME }}/my-app:1.0.0

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.223.31.123
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Копіюємо маніфести (це спрощений варіант, можна через cat)
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-dev.yaml
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-release.yaml

            # Виконуємо вимогу про port-forward (запускаємо у фоні)
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev > dev-pf.log 2>&1 &
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release > rel-pf.log 2>&1 &
