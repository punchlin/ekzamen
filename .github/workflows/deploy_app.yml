name: "Deploy Application Task 3"

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t yulianna2022/my-app:develop https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker build -t yulianna2022/my-app:1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker push yulianna2022/my-app:develop
          docker push yulianna2022/my-app:1.0.0

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.223.31.123 # ВСТАВ СВІЙ IP
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          
         script: |
            # 1. Встановлюємо утиліту screen, якщо її нема
            apt-get update && apt-get install -y screen net-tools

            # 2. Застосовуємо маніфести
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-dev.yaml
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-release.yaml

            # 3. Очищуємо старі процеси
            pkill -f "port-forward" || true
            screen -wipe || true

            # 4. Чекаємо, поки поди стануть Running
            echo "Waiting for pods..."
            sleep 20
            kubectl get pods -A

            # 5. ЗАПУСК ПОРТ-ФОРВАРДУ ЧЕРЕЗ SCREEN
            # Це дозволить процесу працювати у фоні вічно
            echo "Starting background port-forwards..."
            screen -d -m kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev
            screen -d -m kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release

            sleep 5
            # Перевірка, чи відкрилися порти на сервері
            netstat -tuln | grep -E '8002|8003'
            
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: app-service-dev
              namespace: dev
            spec:
              type: NodePort
              selector:
                app: my-app
              ports:
                - port: 80
                  targetPort: 80
                  nodePort: 30002
            EOF

            # 3. Деплоїмо RELEASE
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: app-release
              namespace: release
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app: my-app
              template:
                metadata:
                  labels:
                    app: my-app
                spec:
                  containers:
                  - name: web-app
                    image: yulianna2022/my-app:1.0.0
                    ports:
                    - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: app-service-release
              namespace: release
            spec:
              type: NodePort
              selector:
                app: my-app
              ports:
                - port: 80
                  targetPort: 80
                  nodePort: 30003
            EOF

            # 4. ЧЕКАЄМО ТА ПЕРЕВІРЯЄМО
            echo "Waiting for pods to start..."
            sleep 30
            kubectl get pods -A
            
            # 5. ПОРТ-ФОРВАРД (відв'язуємо від сесії)
            pkill -f "port-forward" || true
            
            # Запускаємо і повністю від'єднуємо від терміналу
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev > /dev/null 2>&1 &
            disown
            
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release > /dev/null 2>&1 &
            disown
            
            echo "Port-forwarding started successfully!"
            
            # Виведемо список процесів для перевірки
            ps aux | grep port-forward