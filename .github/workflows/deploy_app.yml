name: "Deploy Application Task 3"

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Images
        run: |
          docker build -t yulianna2022/my-app:develop https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker build -t yulianna2022/my-app:1.0.0 https://github.com/YulianSalo/devops-exam-pt2.git#main
          docker push yulianna2022/my-app:develop
          docker push yulianna2022/my-app:1.0.0

      - name: Deploy to Minikube via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 159.223.31.123 # ПЕРЕВІР IP ЩЕ РАЗ
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Застосовуємо маніфести
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-dev.yaml
            kubectl apply -f https://raw.githubusercontent.com/${{ github.repository }}/main/task3/k8s-release.yaml

            # 2. Вбиваємо старі процеси
            pkill -f "port-forward" || true
            sleep 5

            # 3. Запускаємо порти так, щоб вони жили довше
            echo "Starting port-forwarding..."
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-dev 8002:80 -n dev > /dev/null 2>&1 &
            nohup kubectl port-forward --address 0.0.0.0 svc/app-service-release 8003:80 -n release > /dev/null 2>&1 &

            sleep 10

            # 4. ДІАГНОСТИКА (це покаже нам правду в логах)
            echo "--- ДІАГНОСТИКА ---"
            echo "Мій внутрішній IP:"
            hostname -I
            echo "Чи слухаються порти 8002 та 8003?"
            netstat -tuln | grep -E '8002|8003' || echo "ПОРТИ ЗАКРИТІ"
            echo "Статус подів:"
            kubectl get pods -A | grep -E 'dev|release'
            echo "--- КІНЕЦЬ ДІАГНОСТИКИ ---"
