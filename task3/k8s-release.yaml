apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dev
  namespace: release
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: web-app
        image: yulianna2022/my-app:1.0.0 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-service-dev
  namespace: dev
spec:
  type: NodePort
  selector:
    app: my-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30003 # Внутрішній порт K8s